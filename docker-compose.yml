services:
  postgres:
    image: postgres:16
    container_name: gladiator_pg
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: gladiator_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gladiators_online
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=gladiator_dev;Username=devuser;Password=devpass
      - ASPNETCORE_ENVIRONMENT=Docker
    depends_on:
      - postgres
    ports:
      - "5179:5179"
    restart: always

volumes:
  pgdata: